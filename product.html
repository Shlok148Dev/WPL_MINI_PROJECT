<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Janka Creations</title>
    <!-- Linking team styles that will be created by Spriha -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        /* Shlok's specific layout styles for the product details page to ensure it looks professional */
        .product-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 50px;
        }
        .product-image img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            aspect-ratio: 1 / 1;
            border: 1px solid #e0e0e0;
        }
        .product-info h1 {
            font-size: 2.2rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .category-label {
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .price {
            font-size: 1.8rem;
            color: #333333;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555555;
            margin-bottom: 30px;
        }
        .stock {
            font-size: 1rem;
            color: #333333;
            margin-bottom: 30px;
        }
        .stock-count {
            font-weight: bold;
            color: #2e7d32;
        }
        .btn-primary {
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 12px 30px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background-color: #c4a133;
        }
        .related-products h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            color: #1a1a1a;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .product-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .product-card .price {
            font-size: 1.3rem;
            color: #d4af37;
            margin-bottom: 15px;
        }
        .btn-small {
            display: inline-block;
            padding: 8px 20px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-small:hover {
            background: #333333;
        }
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Shared Navigation Bar Structure -->
    <nav class='navbar' style="background-color: #1a1a1a; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;">
        <div class='logo' style="font-size: 1.5rem; font-weight: bold; color: #d4af37;">Janka Creations</div>
        <ul class='nav-links' style="list-style: none; display: flex; gap: 20px; margin: 0; padding: 0;">
            <li><a href='index.html' style="color: white; text-decoration: none;">Home</a></li>
            <li><a href='catalogue.html' style="color: white; text-decoration: none;">Catalogue</a></li>
            <li><a href='search.html' style="color: white; text-decoration: none;">Search</a></li>
            <li><a href='contact.html' style="color: white; text-decoration: none;">Contact</a></li>
            <li><a href='register.html' style="color: white; text-decoration: none;">Register</a></li>
            <li><a href='feedback.html' style="color: white; text-decoration: none;">Feedback</a></li>
        </ul>
        <div class='menu-toggle' style="display: none; cursor: pointer; font-size: 1.5rem;">&#9776;</div>
    </nav>

    <main class="product-wrapper">
        <div id='product-container' class='product-container'>
            <!-- Dynamic product content injected here -->
        </div>
        
        <section class='related-products'>
            <h2>Related Products</h2>
            <div class='product-grid' id='related-grid'>
                <!-- Dynamic related products injected here -->
            </div>
        </section>
    </main>

    <footer style="background-color: #1a1a1a; color: white; text-align: center; padding: 20px 0; margin-top: 50px;">
        <p>&copy; 2026 Janka Creations. All Rights Reserved.</p>
    </footer>

    <!-- Products Data Array -->
    <script src='js/products.js'></script>
    
    <!-- Shlok's Custom Logic for Product Details Page -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.productsData) {
                console.error("products.js failed to load or productsData is not defined.");
                document.getElementById('product-container').innerHTML = "<p>Error loading product data. Please check your connection.</p>";
                return;
            }

            // Read product ID from URL: product.html?id=3
            const params = new URLSearchParams(window.location.search);
            let id = parseInt(params.get('id'));

            // Default to product ID 1 if no valid ID provided
            if (!id || isNaN(id) || !window.productsData.find(p => p.id === id)) {
                id = 1;
            }

            const product = window.productsData.find(p => p.id === id);

            // Render product details
            document.getElementById('product-container').innerHTML = `
                <div class='product-image'>
                    <img src='${product.image}' alt='${product.name}' onerror="this.src='https://via.placeholder.com/600x600?text=Product+Image'">
                </div>
                <div class='product-info'>
                    <h1>${product.name}</h1>
                    <p class='category-label'>${product.category}</p>
                    <p class='price'>Rs. ${product.price.toLocaleString()}</p>
                    <p class='desc'>${product.description}</p>
                    <p class='stock'>Availability: <span class='stock-count'>${product.stock} in stock</span></p>
                    <button onclick="alert('Thank you for your interest! Please proceed to the Contact Us page to place your order for the ${product.name}.')" class='btn-primary'>Inquire Now</button>
                </div>
            `;

            // Filter out 3 related products from the same category
            const related = window.productsData
                .filter(p => p.category === product.category && p.id !== id)
                .slice(0, 3);

            const relatedGrid = document.getElementById('related-grid');
            if (related.length > 0) {
                relatedGrid.innerHTML = related.map(p => `
                    <div class='product-card'>
                        <img src='${p.image}' alt='${p.name}' onerror="this.src='https://via.placeholder.com/300x300?text=Related+Image'">
                        <h3>${p.name}</h3>
                        <p class='price'>Rs. ${p.price.toLocaleString()}</p>
                        <a href='product.html?id=${p.id}' class='btn-small'>View Details</a>
                    </div>
                `).join('');
            } else {
                relatedGrid.innerHTML = "<p style='grid-column: 1 / -1; text-align: center; color: #555;'>No related products available at the moment.</p>";
            }
        });
    </script>
</body>
</html>
